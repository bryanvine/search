<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Offline</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      background: #fafaf7;
      color: #1a1915;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #11110e; color: #f4f3ee; }
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 600; }
    p { font-style: italic; color: #7b7868; margin: 0 0 1.5rem; max-width: 36ch; line-height: 1.5; }
    a { color: #c2410c; text-decoration: none; border-bottom: 1px solid currentColor; padding-bottom: 1px; }
  </style>
</head>
<body>
  <h1>You're offline</h1>
  <p>Search needs the network to fetch results. Reconnect and try again.</p>
  <a href="/">Reload</a>
</body>
</html>
