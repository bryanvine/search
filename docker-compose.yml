services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: search-app
    ports:
      - "20000:20000"
    environment:
      - PORT=20000
      - NODE_ENV=production
      - SEARXNG_URL=http://searxng:8080
      - REDIS_URL=redis://redis:6379
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://localhost:8100/v1}
      - VLLM_MODEL=${VLLM_MODEL:-your-model}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:20000}
    depends_on:
      searxng:
        condition: service_started
      redis:
        condition: service_healthy
    # When the vLLM hostname isn't routable from inside the container (e.g. it
    # lives on a Tailscale/VPN network), set VLLM_HOSTNAME and VLLM_HOST_IP in
    # your .env so docker-compose maps it. Defaults below resolve to the
    # docker host so this is a no-op for local-only setups.
    extra_hosts:
      - "${VLLM_HOSTNAME:-vllm.local}:${VLLM_HOST_IP:-host-gateway}"
    networks:
      - search-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  searxng:
    image: searxng/searxng:latest
    container_name: search-searxng
    ports:
      - "20080:8080"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - INSTANCE_NAME=${SEARXNG_INSTANCE_NAME:-search}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - search-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: search-redis
    ports:
      - "20379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - search-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  redis-data:

networks:
  search-net:
    driver: bridge
