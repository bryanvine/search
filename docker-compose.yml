services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: search-app
    ports:
      - "20000:20000"
    environment:
      - PORT=20000
      - NODE_ENV=production
      # Through the gateway (pacing + shared cache) — scrapers hit this app's
      # /api/search too, so the direct path would dodge the pacing.
      - SEARXNG_URL=${SEARXNG_URL:-http://gateway:20080}
      - SEARCH_CACHE_TTL_S=${SEARCH_CACHE_TTL_S:-3600}
      - REDIS_URL=redis://redis:6379
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://localhost:8100/v1}
      - VLLM_MODEL=${VLLM_MODEL:-your-model}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:20000}
      # Optional AI-generated-content detector (ai-detector project).
      # Leave DETECTOR_URL empty to hide the feature entirely.
      - DETECTOR_URL=${DETECTOR_URL:-}
      - DETECTOR_PUBLIC_URL=${DETECTOR_PUBLIC_URL:-}
    depends_on:
      gateway:
        condition: service_started
      searxng:
        condition: service_started
      redis:
        condition: service_healthy
    # When the vLLM hostname isn't routable from inside the container (e.g. it
    # lives on a Tailscale/VPN network), set VLLM_HOSTNAME and VLLM_HOST_IP in
    # your .env so docker-compose maps it. Defaults below resolve to the
    # docker host so this is a no-op for local-only setups.
    extra_hosts:
      - "${VLLM_HOSTNAME:-vllm.local}:${VLLM_HOST_IP:-host-gateway}"
      # Lets DETECTOR_URL point at a service running on the docker host.
      - "host.docker.internal:host-gateway"
    networks:
      - search-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # Caching + pacing proxy in front of SearXNG. Several apps on this host
  # share the instance via host port 20080; the gateway smooths their combined
  # request rate so upstream engines stop suspending us, and caches repeat
  # queries. SearXNG itself is compose-internal only.
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: search-gateway
    ports:
      - "20080:20080"
    environment:
      - SEARXNG_UPSTREAM=http://searxng:8080
      - GATEWAY_RATE_PER_MIN=${GATEWAY_RATE_PER_MIN:-10}
      - GATEWAY_BURST=${GATEWAY_BURST:-4}
      - GATEWAY_CACHE_TTL_S=${GATEWAY_CACHE_TTL_S:-1800}
      - GATEWAY_CACHE_MAX=${GATEWAY_CACHE_MAX:-2000}
      - GATEWAY_MAX_WAIT_S=${GATEWAY_MAX_WAIT_S:-20}
    depends_on:
      searxng:
        condition: service_started
    networks:
      - search-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  searxng:
    image: searxng/searxng:latest@sha256:c5e5aedb70ec4b7ff5b1e8f8ea69253dceb85a98b8757360c1b65fe8652d6066
    container_name: search-searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - INSTANCE_NAME=${SEARXNG_INSTANCE_NAME:-search}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - search-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: search-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - search-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  redis-data:

networks:
  search-net:
    driver: bridge
